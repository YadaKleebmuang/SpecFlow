    - จัดสเปค [15000](budget) [เล่นเกม](usage)
    - อยากจัดคอมงบ [25000](budget) เอาไว้[เล่นเกม Genshin กับ Valorant](usage) ครับ
    - จัดสเปคคอม [15000](budget) บาท สำหรับ[ทำงานเอกสารและดูหนัง](usage) ครับ
