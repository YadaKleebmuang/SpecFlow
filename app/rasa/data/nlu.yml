version: "3.1"

nlu:
- intent: greet
  examples: |
    - สวัสดี
    - ดีจ้า
    - หวัดดี
    - สวัสดีครับ
    - สวัสดีค่ะ
    - ฮัลโหล
    - เริ่มต้น
    - มีใครอยู่ไหม

# เพิ่มส่วนนี้อีก ให้ครอบคลุมทุกการใช้งาน กว่านี้อีก
- intent: build_pc
  examples: |
    - จัดสเปคคอมให้หน่อย
    - อยากได้คอมใหม่
    - ช่วยประกอบคอมหน่อย
    - แนะนำสเปคคอมหน่อย
    - จัดคอม
    - อยากจัดสเปคคอม
    - ขอคำแนะนำจัดสเปคคอมครับ
    - ต้องการคอมเครื่องใหม่
    - อยากจัดสเปคคอม [30000](budget) บาท ไว้[เล่นเกม](usage)
    - จัดคอมงบ [20000](budget) เน้น[ทำงานกราฟิกหรือวิดีโอ](usage)
    - ช่วยจัดสเปคคอมงบ [40000](budget) บาทให้หน่อย เอาไป[ทำงานสำนักงาน](usage)
    - อยากได้คอมเล่นเกมงบ [50000](budget)
    - จัดสเปค [15000](budget) [เล่นเกม](usage)

- intent: upgrade_pc
  examples: |
    - อยากอัปเกรดคอม
    - ควรอัปเกรดอะไรดี
    - ช่วยดูให้หน่อยว่าควรอัปเกรดอะไร
    - คอมช้า อยากอัปเกรด
    - อัปเกรดการ์ดจอดีไหม
    - ขอคำแนะนำอัปเกรด pc
    - อัปเกรดสเปคคอม

- intent: inform_budget
  examples: |
    - มีงบ [30000](budget)
    - งบประมาณ [25000](budget) บาท
    - ไม่เกิน [40000](budget)
    - งบ [15000](budget)
    - มีเงินอยู่ [20000](budget)
    - งบจำกัดที่ [35000](budget)
    - ประมาณ [50000](budget) บาท

# เพิ่มส่วนนี้อีก ให้ครอบคลุมทุกการใช้งาน กว่านี้อีก
- intent: inform_usage
  examples: |
    - เอามา[เล่นเกม](usage)
    - เน้น[ทำงานกราฟิกหรือวิดีโอ](usage)
    - ใช้[ทำงานสำนักงาน](usage)
    - เอาไว้[สตรีมเกม](usage)
    - [เล่นเกมหนักๆ](usage)
    - ใช้[เขียนโปรแกรม](usage)
    - [ตัดต่อวิดีโอ 4k](usage)

- intent: inform_current_specs
  examples: |
    - ตอนนี้ใช้ i5 10400f
    - สเปคตอนนี้มี gtx 1050ti
    - ใช้การ์ดจอ rtx 2060
    - มีแค่แรม 8gb
    - ใช้ hdd 1tb
    - สเปคเดิมคือ ryzen 5 3600
    - ใช้ i3 gen 10 การ์ดจอ 1650
    - ปัจจุบันใช้โน้ตบุ๊ก i7
    - สเปคคอมตอนนี้คือ i5 gen 4, ram 8gb, gtx 970

- intent: ask_cpu_info
  examples: |
    - CPU คืออะไร
    - ซีพียูทำหน้าที่อะไร
    - อยากรู้ว่า cpu สำคัญยังไง
    - cpu มีผลกับอะไรบ้าง
    - อธิบาย cpu ให้ฟังหน่อย

- intent: ask_gpu_info
  examples: |
    - การ์ดจอคืออะไร
    - GPU สำคัญยังไง
    - การ์ดจอเอาไว้ทำอะไร
    - ทำไมต้องซื้อการ์ดจอแพงๆ
    - อธิบาย gpu ให้ฟังหน่อย

- intent: ask_ram_info
  examples: |
    - RAM คืออะไร
    - ทำไมต้องเพิ่มแรม
    - แรมเยอะช่วยอะไร
    - แรม 16gb ต่างกับ 8gb ยังไง
    - อธิบาย ram ให้ฟังหน่อย

- intent: ask_ssd_hdd_diff
  examples: |
    - SSD กับ HDD ต่างกันยังไง
    - ควรใช้ ssd หรือ hdd
    - hdd กับ ssd อันไหนดีกว่ากัน
    - ทำไม ssd ถึงแพงกว่า
    - ฮาร์ดดิสก์ธรรมดากับ ssd ต่างกันตรงไหน

- intent: optimize_performance
  examples: |
    - คอมช้ามากทำไงดี
    - อยากตั้งค่าให้เล่นเกมลื่นขึ้น
    - ปรับเครื่องให้ทำงานเร็วขึ้น
    - คอมอืดมีวิธีแก้ไหม
    - เพิ่มความเร็วคอมยังไง
    - อยากให้คอมเรนเดอร์ไวขึ้นต้องตั้งค่าอะไร
    - คอมแลคมาก

- intent: inform_future_upgrade
  examples: |
    - เผื่ออัปเกรดด้วย
    - อยากใช้นานๆ
    - รองรับอนาคต
    - เผื่ออนาคต
    - อยากได้รุ่นใหม่ๆ

- intent: affirm
  examples: |
    - ใช่
    - เอา
    - เผื่อด้วย
    - ครับ
    - ค่ะ
    - ใช่ครับ
    - ต้องการ

- intent: deny
  examples: |
    - ไม่
    - ไม่จำเป็น
    - ไม่ต้องเผื่อ
    - เอางบประหยัด
    - ไม่เอา
    - ไม่ครับ
