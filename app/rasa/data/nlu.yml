- intent: inform_current_specs
  examples: |
    - ตอนนี้ใช้ i5 10400f
    - สเปคตอนนี้มี gtx 1050ti
    - ใช้การ์ดจอ rtx 2060
    - มีแค่แรม 8gb
    - ใช้ hdd 1tb
    - สเปคเดิมคือ ryzen 5 3600
    - ใช้ i3 gen 10 การ์ดจอ 1650
    - ปัจจุบันใช้โน้ตบุ๊ก i7
    - สเปคคอมตอนนี้คือ i5 gen 4, ram 8gb, gtx 970

- intent: ask_cpu_info
  examples: |
    - CPU คืออะไร
    - ซีพียูทำหน้าที่อะไร
    - อยากรู้ว่า cpu สำคัญยังไง
    - cpu มีผลกับอะไรบ้าง
    - อธิบาย cpu ให้ฟังหน่อย

- intent: ask_gpu_info
  examples: |
    - การ์ดจอคืออะไร
    - GPU สำคัญยังไง
    - การ์ดจอเอาไว้ทำอะไร
    - ทำไมต้องซื้อการ์ดจอแพงๆ
    - อธิบาย gpu ให้ฟังหน่อย

- intent: ask_ram_info
  examples: |
    - RAM คืออะไร
    - ทำไมต้องเพิ่มแรม
    - แรมเยอะช่วยอะไร
    - แรม 16gb ต่างกับ 8gb ยังไง
    - อธิบาย ram ให้ฟังหน่อย

- intent: ask_ssd_hdd_diff
  examples: |
    - SSD กับ HDD ต่างกันยังไง
    - ควรใช้ ssd หรือ hdd
    - hdd กับ ssd อันไหนดีกว่ากัน
    - ทำไม ssd ถึงแพงกว่า
    - ฮาร์ดดิสก์ธรรมดากับ ssd ต่างกันตรงไหน

- intent: optimize_performance
  examples: |
    - คอมช้ามากทำไงดี
    - อยากตั้งค่าให้เล่นเกมลื่นขึ้น
    - ปรับเครื่องให้ทำงานเร็วขึ้น
    - คอมอืดมีวิธีแก้ไหม
    - เพิ่มความเร็วคอมยังไง
    - อยากให้คอมเรนเดอร์ไวขึ้นต้องตั้งค่าอะไร
    - คอมแลคมาก

- intent: inform_future_upgrade
