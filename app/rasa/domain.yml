version: "3.1"

intents:
  - greet
  - build_pc
  - upgrade_pc
  - inform_budget
  - inform_usage
  - inform_current_specs
  - ask_cpu_info
  - ask_gpu_info
  - ask_ram_info
  - ask_ssd_hdd_diff
  - optimize_performance
  - inform_future_upgrade
  - affirm
  - deny
entities:
  - budget
  - usage

slots:
  budget:
    type: text
    influence_conversation: true
    mappings:
    - type: from_entity
      entity: budget
    - type: from_text
      conditions:
      - active_loop: build_pc_form
        requested_slot: budget
  usage:
    type: text
    influence_conversation: true
    mappings:
    - type: from_entity
      entity: usage
    - type: from_text
      conditions:
      - active_loop: build_pc_form
        requested_slot: usage
      - active_loop: upgrade_pc_form
        requested_slot: usage
  current_specs:
    type: text
    influence_conversation: false
    mappings:
    - type: from_text
      conditions:
      - active_loop: upgrade_pc_form
        requested_slot: current_specs
  future_upgrade:
    type: bool
    influence_conversation: true
    mappings:
    - type: from_intent
      value: true
      intent: affirm
      conditions:
      - active_loop: build_pc_form
        requested_slot: future_upgrade
    - type: from_intent
      value: true
      intent: inform_future_upgrade
      conditions:
      - active_loop: build_pc_form
        requested_slot: future_upgrade
    - type: from_intent
      value: false
      intent: deny
      conditions:
      - active_loop: build_pc_form
        requested_slot: future_upgrade

forms:
  build_pc_form:
    required_slots:
      - budget
      - usage
      - future_upgrade
  upgrade_pc_form:
    required_slots:
      - usage
      - current_specs

actions:
  - action_recommend_pc
  - action_recommend_upgrade

responses:
  utter_greet:
  - text: "สวัสดีครับ ยินดีต้อนรับสู่ SpecFlow มีอะไรให้ผมช่วยจัดสเปค หรืออัปเกรดคอมไหมครับ?"
  
  utter_ask_budget:
  - text: "คุณมีงบประมาณสำหรับจัดคอมประมาณเท่าไหร่ครับ?"

  utter_ask_usage:
  - text: "คุณเน้นนำไปใช้งานด้านไหนเป็นหลักครับ? (เช่น เล่นเกม, ทำงานตัดต่อ)"

  utter_ask_current_specs:
  - text: "ปัจจุบันคุณใช้คอมพิวเตอร์สเปคอะไรอยู่บ้างครับ? (เช่น CPU, การ์ดจอ, แรม) พอบอกคร่าวๆ ได้ไหมครับ?"

  utter_ask_future_upgrade:
  - text: "คุณต้องการเผื่ออัปเกรดในอนาคตด้วยไหมครับ? (เช่น เลือกเมนบอร์ดและแรมรุ่นใหม่ๆ เผื่อไว้) ตอบ ใช่/ไม่ หรือพิมพ์บอกได้เลยครับ"

  utter_faq_cpu:
  - text: "CPU (ซีพียู) เปรียบเสมือนสมองของคอมพิวเตอร์ ทำหน้าที่ประมวลผลคำสั่งต่างๆ ยิ่งมี Core/Thread เยอะและความเร็ว (GHz) สูง ก็ยิ่งประมวลผลงานหนักๆ หรือหลายโปรแกรมพร้อมกันได้ดีครับ"

  utter_faq_gpu:
  - text: "GPU (การ์ดจอ) ทำหน้าที่ประมวลผลภาพและกราฟิกครับ ถ้าคุณเน้นเล่นเกม 3D หรือทำงานตัดต่อ/เรนเดอร์วิดีโอ การ์ดจอที่แรงจะช่วยให้ภาพลื่นไหลและทำงานเสร็จไวขึ้นมากครับ"

  utter_faq_ram:
  - text: "RAM (แรม) คือหน่วยความจำชั่วคราว ยิ่งมี RAM เยอะ (เช่น 16GB หรือ 32GB) คอมพิวเตอร์ก็จะสามารถเปิดหลายๆ โปรแกรมพร้อมกัน หรือเปิดแท็บเบราว์เซอร์เยอะๆ ได้โดยที่เครื่องไม่ค้างครับ"

  utter_faq_ssd_hdd:
  - text: "SSD และ HDD เป็นตัวเก็บข้อมูลทั้งคู่ครับ แต่ **SSD** จะเร็วกว่า HDD หลายสิบเท่า ทำให้เปิดเครื่องและโหลดเกมไวมาก ส่วน **HDD** จะมีราคาถูกกว่าในความจุที่เท่ากัน แนะนำให้ใช้ SSD ลงวินโดว์และโปรแกรมหลัก แล้วใช้ HDD เก็บไฟล์งานทั่วไปครับ"

  utter_optimize_performance:
  - text: "สำหรับการเพิ่มความเร็วและการปรับแต่งให้คอมพิวเตอร์ทำงานลื่นไหลขึ้น เบื้องต้นผมขอแนะนำดังนี้ครับ:\n1. **อัปเดตไดรเวอร์**: โดยเฉพาะไดรเวอร์การ์ดจอ ให้เป็นเวอร์ชันล่าสุดเสมอ\n2. **ปิด Startup Programs**: ปิดโปรแกรมที่ไม่ได้ใช้แต่รันขึ้นมาพร้อมวินโดวส์\n3. **เคลียร์ไฟล์ขยะ (Disk Cleanup)**: และตรวจสอบไม่ให้ไดรฟ์ C: เต็มจนเกินไป\n4. **เปิด Game Mode / High Performance Power Plan**: ในตั้งค่า Windows เพื่อรีดประสิทธิภาพสูงสุดครับ\n\n*หากทำตามนี้แล้วยังช้าอยู่ อาจถึงเวลาต้องอัปเกรดฮาร์ดแวร์ (สามารถพิมพ์ว่า 'อยากอัปเกรดคอม' เพื่อให้ผมช่วยวิเคราะห์ได้ครับ)*"
